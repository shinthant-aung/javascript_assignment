<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript_Assignment_2</title>
</head>
<body>
    <h3>Today Fruits</h3> 
    <ul id="fruit-list"></ul> 
    <hr/> 
    <h3>Today Vegetables</h3> 
    <ul id="veg-list"></ul> 

    <script> 
        const fruits = ["Apple","Banana","Orange","Mango","Strawberry"];
        const vegs = ["Carrot","Broccoli","Spinach","Tomato","Cucumber"];
        for (let i = 0; i < fruits.length ; i++){
            document.getElementById('fruit-list').innerHTML += `<li> ${fruits[i]} </li>`
        }

        for (let i = 0; i < vegs.length ; i++){
            document.getElementById('veg-list').innerHTML += `<li> ${vegs[i]} </li>`
        }
    </script> 
</body>
</html>
